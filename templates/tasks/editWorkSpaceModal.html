<!-- Button trigger modal -->
<!--a class="btn btn-primary task-details-link" data-taskId="" data-bs-toggle="modal" data-bs-target="#taskDetailsModal">View task</a-->

<!-- Modal -->
<div class="modal fade" id="workSpaceEditModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-labelledby="workSpaceEditModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-scrollable modal-fullscreen-sm-down">
    <div class="modal-content">
      <div class="modal-header">
        <h6>WorkSpace Edit Panel</h6>
        <h3 class="modal-title" id="workSpaceEditModalLabel"><div class="h6 text-muted d-none">[WorkSpace #<span id="wowo_id" ></span>]</div><span id="name" class="d-none"></span></h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div id="workSpaceEditModalResponse"></div>
        <form method="post" id="workSpaceEditForm">
            {% csrf_token %}
            {{ workspaceForm.as_div }}
            <div class="row bg-body-secondary mt-3 p-2">
              <div class="col-12 d-flex justify-content-end">
                <input type="submit" value="Save" data-bs-toggle="tooltip" data-bs-placement="left" data-bs-title="Submit form. Response with be displayed near top of form." id="workSpaceEditFormSaveBtn" class="btn btn-info btn-sm">
              </div>
            </div>
        </form>
      </div>
    </div>
  </div>
</div>
